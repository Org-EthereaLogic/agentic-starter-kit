# Supply-chain audit for {{ cookiecutter.project_name }}.
#
# Runs language-native dependency audit on every PR and on push to
# the default branch. Python: pip-audit against the resolved uv lock
# (exported to a requirements.txt-compatible file). TypeScript: npm
# audit (production deps only).
#
# Action pinning policy (DIRECTIVES.md IMP-006):
#   Every `uses:` below is pinned to a 40-character commit SHA
#   with a trailing `# v<x>.<y>` comment Dependabot can track.
#   `scripts/check-action-pins.sh` enforces this mechanically.
{% raw %}
name: Supply-chain audit

on:
  pull_request: {}
  push:
    branches:
      - {% endraw %}{{ cookiecutter.default_branch_name }}{% raw %}

permissions:
  contents: read
{% endraw %}
{% if cookiecutter.primary_language in ("python", "polyglot") %}
{% raw %}
jobs:
  python-audit:
    name: pip-audit (Python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install --upgrade pip uv

      - name: Sync dependencies
        run: make sync

      - name: Export resolved requirements for pip-audit
        # `pypa/gh-action-pip-audit` passes `inputs:` to pip-audit's
        # `--requirement` flag, which only understands requirements.txt
        # format — passing `pyproject.toml` directly fails with
        # `invalid specifier at line 12: [project]`. Export uv's
        # resolved lock to a requirements.txt the action can audit.
        # `--no-emit-project` excludes the project itself (we audit
        # third-party deps, not our own package); `--no-hashes` keeps
        # the output a plain pip-readable file.
        run: uv export --no-emit-project --no-hashes --format requirements-txt --output-file requirements.audit.txt

      - name: pip-audit
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0 (no bare v1 tag published)
        with:
          inputs: requirements.audit.txt
          # Set vulnerability-service to OSV (default) plus PyPA's
          # advisory database for broader coverage.
          vulnerability-service: osv
{% endraw %}
{% endif %}
{% if cookiecutter.primary_language in ("typescript", "polyglot") %}
{% raw %}
{% endraw %}{% if cookiecutter.primary_language == "typescript" %}jobs:
{% endif %}{% raw %}
  npm-audit:
    name: npm audit (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
{% endraw %}
{% endif %}
{% if cookiecutter.include_macaron == "yes" %}
{% raw %}
  macaron:
    name: Macaron supply-chain analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Macaron
        run: pip install macaron

      - name: Run Macaron
        # Macaron defaults to a manifest-driven analysis; the
        # report is uploaded as an artifact for the security
        # reviewer subagent to ingest.
        run: |
          mkdir -p macaron-output
          macaron analyze -rp . -o macaron-output/

      - name: Upload Macaron report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macaron-report
          path: macaron-output/
          retention-days: 30
{% endraw %}
{% endif %}
