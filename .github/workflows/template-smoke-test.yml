name: Template Smoke Test

on:
  push:
    branches: [main]
    paths:
      - 'cookiecutter.json'
      - 'copier.yml'
      - 'hooks/**'
      - '{{cookiecutter.project_slug}}/**'
      - '.github/workflows/template-smoke-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cookiecutter.json'
      - 'copier.yml'
      - 'hooks/**'
      - '{{cookiecutter.project_slug}}/**'
      - '.github/workflows/template-smoke-test.yml'

permissions:
  contents: read

jobs:
  smoke-test:
    name: Test Template Variants
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Render every variant under both render tools to satisfy
        # the Phase C1 acceptance criterion: "CI smoke test renders
        # both modes (cookiecutter and copier) on every PR."
        tool: [cookiecutter, copier]
        variant:
          - name: 'Python (MIT, no extras, ty)'
            primary_language: 'python'
            python_typechecker: 'ty'
            license: 'MIT'
            include_sbom: 'no'
            include_codacy: 'no'
            include_snyk: 'no'

          - name: 'Python (MIT, mypy fallback)'
            primary_language: 'python'
            python_typechecker: 'mypy'
            license: 'MIT'
            include_sbom: 'no'
            include_codacy: 'no'
            include_snyk: 'no'

          - name: 'Python (Apache2, with SBOM, ty)'
            primary_language: 'python'
            python_typechecker: 'ty'
            license: 'Apache-2.0'
            include_sbom: 'yes'
            include_codacy: 'no'
            include_snyk: 'no'

          - name: 'TypeScript (MIT, no extras)'
            primary_language: 'typescript'
            python_typechecker: 'ty'
            license: 'MIT'
            include_sbom: 'no'
            include_codacy: 'no'
            include_snyk: 'no'

          - name: 'TypeScript (Apache-2.0, with tools)'
            primary_language: 'typescript'
            python_typechecker: 'ty'
            license: 'Apache-2.0'
            include_sbom: 'yes'
            include_codacy: 'yes'
            include_snyk: 'yes'

          - name: 'Polyglot (MIT, all options, ty)'
            primary_language: 'polyglot'
            python_typechecker: 'ty'
            license: 'MIT'
            include_sbom: 'yes'
            include_codacy: 'yes'
            include_snyk: 'yes'

          - name: 'Polyglot (MIT, all options + macaron, mypy)'
            primary_language: 'polyglot'
            python_typechecker: 'mypy'
            license: 'MIT'
            include_sbom: 'yes'
            include_codacy: 'yes'
            include_snyk: 'yes'
            include_macaron: 'yes'

    steps:
      - name: Checkout template source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install render tool
        run: pip install ${{ matrix.tool }} --quiet

      - name: Render template variant (cookiecutter)
        if: matrix.tool == 'cookiecutter'
        env:
          PRIMARY_LANGUAGE: ${{ matrix.variant.primary_language }}
          PYTHON_TYPECHECKER: ${{ matrix.variant.python_typechecker }}
          LICENSE: ${{ matrix.variant.license }}
          INCLUDE_SBOM: ${{ matrix.variant.include_sbom }}
          INCLUDE_CODACY: ${{ matrix.variant.include_codacy }}
          INCLUDE_SNYK: ${{ matrix.variant.include_snyk }}
          INCLUDE_MACARON: ${{ matrix.variant.include_macaron || 'no' }}
        run: |
          cookiecutter . \
            --no-input \
            --output-dir /tmp/rendered \
            -f \
            primary_language="$PRIMARY_LANGUAGE" \
            python_typechecker="$PYTHON_TYPECHECKER" \
            license="$LICENSE" \
            include_sbom="$INCLUDE_SBOM" \
            include_codacy="$INCLUDE_CODACY" \
            include_snyk="$INCLUDE_SNYK" \
            include_macaron="$INCLUDE_MACARON"

          mv /tmp/rendered/my-agentic-project rendered-project

      - name: Render template variant (copier)
        if: matrix.tool == 'copier'
        env:
          PRIMARY_LANGUAGE: ${{ matrix.variant.primary_language }}
          PYTHON_TYPECHECKER: ${{ matrix.variant.python_typechecker }}
          LICENSE: ${{ matrix.variant.license }}
          INCLUDE_SBOM: ${{ matrix.variant.include_sbom }}
          INCLUDE_CODACY: ${{ matrix.variant.include_codacy }}
          INCLUDE_SNYK: ${{ matrix.variant.include_snyk }}
          INCLUDE_MACARON: ${{ matrix.variant.include_macaron || 'no' }}
        run: |
          mkdir -p rendered-project
          copier copy --trust --defaults --vcs-ref HEAD \
            -d primary_language="$PRIMARY_LANGUAGE" \
            -d python_typechecker="$PYTHON_TYPECHECKER" \
            -d license="$LICENSE" \
            -d include_sbom="$INCLUDE_SBOM" \
            -d include_codacy="$INCLUDE_CODACY" \
            -d include_snyk="$INCLUDE_SNYK" \
            -d include_macaron="$INCLUDE_MACARON" \
            . rendered-project

      - name: Verify no unrendered variables
        run: |
          if grep -rn "{{[[:space:]]*cookiecutter\." rendered-project/; then
            echo "ERROR: Found unrendered cookiecutter variables"
            exit 1
          fi
          if grep -rn "{{[[:space:]]*_copier" rendered-project/ \
              --exclude=".copier-answers.yml"; then
            echo "ERROR: Found unrendered copier-only variables"
            exit 1
          fi
          echo "✓ No unrendered variables found"

      - name: Verify rendered shell scripts stay byte-identical
        run: |
          find rendered-project/scripts -type f -name '*.sh' | sort | \
            while IFS= read -r script; do
              template_path="{{cookiecutter.project_slug}}/${script#rendered-project/}"
              diff -u "$template_path" "$script"
            done
          echo "✓ Rendered shell scripts match template source"

      - name: Validate new supply-chain workflows are well-formed YAML
        run: |
          for wf in scorecards release supply-chain; do
            python3 -c "import yaml,sys; yaml.safe_load(open('rendered-project/.github/workflows/'+'$wf'+'.yml')); print('  ✓ '+'$wf'+'.yml')"
          done

      - name: Initialize git
        run: |
          cd rendered-project
          git init
          git config user.email "test@example.com"
          git config user.name "Test"
          git checkout -b feat/initial

      - name: Install Python dependencies
        if: matrix.variant.primary_language != 'typescript'
        run: |
          cd rendered-project
          python -m pip install --upgrade pip uv
          make sync

      - name: Install Node dependencies
        if: matrix.variant.primary_language == 'typescript'
        run: |
          cd rendered-project
          npm install

      - name: Run validation gate
        run: |
          cd rendered-project
          make validate

      - name: Verify governance rules
        run: |
          cd rendered-project
          python3 scripts/lib/governance.py --validate

      - name: Report variant success
        run: |
          echo "✅ Tool: ${{ matrix.tool }} | Variant: ${{ matrix.variant.name }}"
          echo "   Primary Language: ${{ matrix.variant.primary_language }}"
          echo "   Type-checker:    ${{ matrix.variant.python_typechecker }}"
          echo "   License: ${{ matrix.variant.license }}"
          echo "   SBOM: ${{ matrix.variant.include_sbom }}"
          echo "   Codacy: ${{ matrix.variant.include_codacy }}"
          echo "   Snyk: ${{ matrix.variant.include_snyk }}"

  render-equivalence:
    name: Cookiecutter ↔ Copier render equivalence
    runs-on: ubuntu-latest
    needs: smoke-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install both render tools
        run: pip install cookiecutter copier --quiet
      - name: Render with cookiecutter
        run: |
          cookiecutter . --no-input -f --output-dir /tmp/cc
      - name: Render with copier
        run: |
          mkdir -p /tmp/co
          copier copy --trust --defaults --vcs-ref HEAD . /tmp/co
      - name: Diff renders (only `.copier-answers.yml` should differ)
        run: |
          diff -rq --exclude='.copier-answers.yml' \
            /tmp/cc/my-agentic-project /tmp/co
          echo "✓ Renders are equivalent"

  smoke-test-summary:
    name: Smoke Test Summary
    if: always()
    needs: [smoke-test, render-equivalence]
    runs-on: ubuntu-latest
    steps:
      - name: Check smoke test results
        run: |
          if [ "${{ needs.smoke-test.result }}" = "success" ] \
              && [ "${{ needs.render-equivalence.result }}" = "success" ]; then
            echo "✅ All template variants and render-equivalence passed"
            exit 0
          else
            echo "❌ One or more variants failed smoke test"
            exit 1
          fi
