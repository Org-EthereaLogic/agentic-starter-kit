# Dependabot configuration for {{ cookiecutter.project_name }}.
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Always present. Conditional ecosystems based on
# `cookiecutter.primary_language` and `include_*` options.

version: 2
updates:
  # GitHub Actions — IMP-006 says SHA-pinned, but version updates
  # still surface as Dependabot PRs (the SHA is the value of
  # the @<sha> ref).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions

{% if cookiecutter.primary_language in ("python", "polyglot") %}  # Python — uv-managed via pyproject.toml.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

{% endif %}{% if cookiecutter.primary_language in ("typescript", "polyglot") %}  # Node / TypeScript — package.json.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - node

{% endif %}{% if cookiecutter.include_devcontainer == "yes" %}  # Devcontainer image references in `.devcontainer/devcontainer.json`.
  # Dependabot errors when this directory is empty, so the entry is
  # gated on `include_devcontainer == "yes"` — only emitted when the
  # devcontainer actually ships.
  - package-ecosystem: docker
    directory: "/.devcontainer"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - devcontainer

  # Production Dockerfile at repo root. SHA-pinned base images get
  # refreshed by Dependabot automatically. Gated on the same flag so
  # Dependabot doesn't error when the Dockerfile is pruned.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
{% endif %}
