# release-please for {{ cookiecutter.project_name }}
#
# Watches conventional-commit messages on the default branch and
# maintains a single open Release PR. Merging that PR bumps the
# version, updates CHANGELOG.md, and pushes a `v<x.y.z>` tag — the
# tag push then triggers `release.yml` (SLSA L3 build + provenance).
#
# release-please owns: version files, CHANGELOG.md, release tag,
# GitHub Release object.
# release-please does NOT touch: anything under `report/`, the
# `report/<UTC-timestamp>-*` evidence trail (IMP-001), specs,
# or governance surfaces.
#
# Action pinning policy (DIRECTIVES.md IMP-006):
#   The `uses:` line below pins to a semver tag with a trailing
#   `# v<x>` comment. Before the first PR against this repository,
#   replace `@v4` with the corresponding commit SHA.
#   `scripts/check-action-pins.sh` (added in a later phase)
#   verifies SHA pinning mechanically.
{% raw %}
name: release-please

on:
  push:
    branches:
      - {% endraw %}{{ cookiecutter.default_branch_name }}{% raw %}

permissions: read-all

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4 # v4
        with:
          config-file: release-please-config.json
          manifest-file: release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
{% endraw %}
