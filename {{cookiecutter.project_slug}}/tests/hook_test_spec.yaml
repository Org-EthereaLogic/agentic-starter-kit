# Hook regression test specification
#
# Single source of truth for all pre-tool-use.js hook tests.
# Both test_pre_tool_use_hook.py and test_pre_tool_use_hook.js
# consume this specification to ensure identical test coverage.
#
# Each test case specifies:
# - name: Test case identifier (unique)
# - class: Bypass class (1-8 per README.md)
# - branch: Initial branch for test repo
# - command: Bash command to execute via hook payload
# - expected_exit: Expected exit code (0=allow, 2=block)
# - check_stderr: Regex pattern to match in stderr (for blocked cases)
# - description: Human-readable test description

tests:
  - name: refspec_to_protected_blocks
    class: 2
    description: "Class 2: refspec-to-protected blocks regardless of HEAD"
    branch: feat/x
    command: "git push origin feat/x:{{ cookiecutter.default_branch_name }}"
    expected_exit: 2
    check_stderr: "{{ cookiecutter.default_branch_name }}"

  - name: implicit_push_from_protected_blocks
    class: 1
    description: "Class 1: `git push` with no refspec while HEAD is protected"
    branch: "{{ cookiecutter.default_branch_name }}"
    command: "git push"
    expected_exit: 2
    check_stderr: "{{ cookiecutter.default_branch_name }}"

  - name: broad_push_all_blocks
    class: 4
    description: "Class 4: `--all` blocks regardless of HEAD"
    branch: feat/x
    command: "git push --all origin"
    expected_exit: 2
    check_stderr: "--all"

  - name: broad_push_mirror_blocks
    class: 4
    description: "Class 4: `--mirror` blocks regardless of HEAD"
    branch: feat/x
    command: "git push --mirror origin"
    expected_exit: 2
    check_stderr: "--mirror"

  - name: commit_on_protected_blocks
    class: 5
    description: "Class 5: `git commit` while HEAD is protected"
    branch: "{{ cookiecutter.default_branch_name }}"
    command: "git commit -m 'feat: x'"
    expected_exit: 2
    check_stderr: "commit"

  - name: merge_on_protected_blocks
    class: 6
    description: "Class 6: commit-producing subcommand on protected HEAD"
    branch: "{{ cookiecutter.default_branch_name }}"
    command: "git merge feat/x"
    expected_exit: 2
    check_stderr: "merge"

  - name: rebase_on_protected_blocks
    class: 6
    description: "Class 6: rebase variant of commit-producing subcommand"
    branch: "{{ cookiecutter.default_branch_name }}"
    command: "git rebase feat/x"
    expected_exit: 2
    check_stderr: ~  # No specific message required

  - name: nested_shell_blocks
    class: 7
    description: "Class 7: `bash -c \"git push ...\"` is re-evaluated"
    branch: feat/x
    command: "bash -c \"git push origin feat/x:{{ cookiecutter.default_branch_name }}\""
    expected_exit: 2
    check_stderr: "nested"

  - name: chained_subcommand_blocks
    class: 8
    description: "Class 8: `&&`-chained git push to protected"
    branch: feat/x
    command: "true && git push origin feat/x:{{ cookiecutter.default_branch_name }}"
    expected_exit: 2
    check_stderr: ~

  - name: feature_branch_push_allows
    class: 0
    description: "Baseline: pushing a feature branch to itself is fine"
    branch: feat/x
    command: "git push origin feat/x:feat/x"
    expected_exit: 0
    check_stderr: ~

  - name: feature_branch_commit_allows
    class: 0
    description: "Baseline: committing on a feature branch is fine"
    branch: feat/x
    command: "git commit -m 'feat: x'"
    expected_exit: 0
    check_stderr: ~

  - name: non_bash_tool_passes_through
    class: 0
    description: "Baseline: non-Bash tool calls are out of scope"
    branch: feat/x
    tool_name: Read
    tool_input: { file_path: "/x" }
    expected_exit: 0
    check_stderr: ~

  - name: non_git_bash_passes_through
    class: 0
    description: "Baseline: non-git Bash commands pass through"
    branch: feat/x
    command: "ls -la"
    expected_exit: 0
    check_stderr: ~

  - name: empty_command_passes_through
    class: 0
    description: "Baseline: empty Bash command is a no-op"
    branch: feat/x
    command: ""
    expected_exit: 0
    check_stderr: ~

# Fixture-based tests (use pre-defined payloads from tests/fixtures/)
fixtures:
  - name: protected_push_fixture_blocks
    fixture: protected-push.json
    expected_exit: 2
    description: "Fixture: protected-push.json blocks"

  - name: broad_push_all_fixture_blocks
    fixture: broad-push-all.json
    expected_exit: 2
    description: "Fixture: broad-push-all.json blocks"

  - name: feature_push_fixture_allows
    fixture: feature-push-allowed.json
    expected_exit: 0
    description: "Fixture: feature-push-allowed.json allows"

  - name: non_bash_tool_fixture_passes_through
    fixture: non-bash-tool.json
    expected_exit: 0
    description: "Fixture: non-bash-tool.json passes through"
