# CI for {{ cookiecutter.project_name }}
#
# This workflow runs the same `make validate` aggregate that
# contributors run locally, plus dedicated jobs for Layer-4 hook
# regression, secret scanning, and the conditional integrations the
# operator opted into at template-render time (Codacy, Snyk,
# Codecov, SBOM).
#
# Action pinning policy (DIRECTIVES.md IMP-006):
#   Every third-party `uses:` below is pinned to a 40-character
#   commit SHA with a trailing `# v<x>.<y>` comment Dependabot can
#   track. `scripts/check-action-pins.sh` enforces this mechanically;
#   any new `uses:` line must follow the same shape. Re-resolve a
#   tag with:
#     gh api repos/<owner>/<repo>/git/refs/tags/<tag> --jq '.object.sha'
#   For annotated tags follow up with:
#     gh api repos/<owner>/<repo>/git/tags/<sha> --jq '.object.sha'
{% raw %}
on:
  push:
    branches:
      - {% endraw %}{{ cookiecutter.default_branch_name }}{% raw %}
  pull_request: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
{% endraw %}
jobs:
  validate:
    name: Validate (make validate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
{% if cookiecutter.primary_language in ("python", "polyglot") %}
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install --upgrade pip uv
{% endif %}
      - name: Sync dependencies
        run: make sync
      - name: Validate
        run: make validate

  hooks-test:
    name: Hooks regression (CRIT-008)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
{% if cookiecutter.primary_language in ("python", "polyglot") %}
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
{% endif %}
      - name: Run hooks regression suite
        run: make hooks-test

  secret-scan:
    name: Secret scan (TruffleHog OSS)
    # TruffleHog OSS is the default secret scanner because
    # `gitleaks/gitleaks-action@v2` requires a paid GITLEAKS_LICENSE
    # for organization-owned repositories — a first-run breaker for
    # most users. TruffleHog is Apache-2.0 and works without any
    # license configuration. To switch back to gitleaks, replace the
    # step below and provide `GITLEAKS_LICENSE` as a repo secret.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          path: ./
          # Scan the full history on push events; on PRs scan only
          # the diff against the base ref to keep runtime bounded.
          base: {% raw %}${{ github.event.before || github.event.pull_request.base.sha || '' }}{% endraw %}
          head: HEAD
          # `--only-verified` filters out unverified hits. Verified
          # findings are the ones worth blocking the build on.
          extra_args: --only-verified

{% if cookiecutter.include_codacy == "yes" %}  codacy:
    name: Codacy analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08 # v4
        with:{% raw %}
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
{% endraw %}          format: sarif
          output: codacy.sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647
{% endif %}
{% if cookiecutter.include_snyk == "yes" %}
  snyk:
    name: Snyk vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
{% if cookiecutter.primary_language in ("python", "polyglot") %}
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Snyk Python
        uses: snyk/actions/python@9cf6ca713d71123d2d229cc3d7f145b96ea3c518 # master HEAD as of 2026-05-07
        continue-on-error: true{% raw %}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
{% endraw %}{% endif %}
{% if cookiecutter.primary_language in ("typescript", "polyglot") %}
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Snyk Node
        uses: snyk/actions/node@9cf6ca713d71123d2d229cc3d7f145b96ea3c518 # master HEAD as of 2026-05-07
        continue-on-error: true{% raw %}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
{% endraw %}{% endif %}
{% endif %}
{% if cookiecutter.include_codecov == "yes" %}
  codecov:
    name: Coverage upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
{% if cookiecutter.primary_language in ("python", "polyglot") %}
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install --upgrade pip uv
{% endif %}
      - name: Sync
        run: make sync
      - name: Coverage
        run: make coverage
      - name: Upload to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:{% raw %}
          token: ${{ secrets.CODECOV_TOKEN }}
{% endraw %}          fail_ci_if_error: false
{% endif %}
{% if cookiecutter.include_sbom == "yes" %}
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
{% if cookiecutter.primary_language in ("python", "polyglot") %}
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install --upgrade pip uv
      - name: Sync project (creates .venv)
        # `cyclonedx-py environment .venv` needs a venv to inspect.
        # Sync without dev deps so the SBOM reflects production
        # dependencies only.
        run: uv sync --no-dev
      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom
{% endif %}
{% if cookiecutter.primary_language in ("typescript", "polyglot") %}
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Install cyclonedx-npm
        run: npm install -g @cyclonedx/cyclonedx-npm
{% endif %}
      - name: Generate SBOM
        run: make sbom
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-{% raw %}${{ github.sha }}{% endraw %}
          path: sbom/
          retention-days: 90
{% endif %}
