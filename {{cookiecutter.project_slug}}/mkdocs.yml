# MkDocs Material configuration for {{ cookiecutter.project_name }}.
#
# Surfaces the contents of `docs/` as a navigable site and is wired
# to the GitHub Pages deploy workflow at `.github/workflows/docs.yml`.
# Edit `nav:` when you add new top-level pages — Material picks up
# nested pages automatically when you give it a directory entry.
#
# Build locally:
#
#   uv tool run --with mkdocs-material mkdocs serve
#   uv tool run --with mkdocs-material mkdocs build --strict
#
# `--strict` turns broken links and unresolved refs into errors;
# CI runs the strict variant on every PR.

site_name: "{{ cookiecutter.project_name }}"
site_description: "{{ cookiecutter.project_description }}"
site_author: "{{ cookiecutter.author_name }}"
docs_dir: docs
site_dir: site

# Surface the rendered project's docs/ directory plus the top-level
# governance and navigation files. The README is symlinked into the
# nav as the landing page when `docs/index.md` does not exist; here
# we ship `docs/index.md` explicitly so behaviour is deterministic.
nav:
  - Home: index.md
  - Standards: STANDARDS.md
  - MCP policy: MCP_POLICY.md
  - Threat model: THREAT_MODEL.md

theme:
  name: material
  features:
    - content.code.copy
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search
