# Tag-driven release with SLSA Level 3 provenance for
# {{ cookiecutter.project_name }}.
#
# Triggered when a `v*` tag is pushed. The build job produces
# distributable artifacts and a base64-encoded SHA-256 hashes file;
# those build outputs remain attached to the workflow run. The
# `provenance` job consumes the hashes and produces verifiable SLSA
# L3 provenance via the official slsa-github-generator reusable
# workflow, which uploads the attestation to the tagged release.
#
# Action pinning policy (DIRECTIVES.md IMP-006):
#   Every third-party `uses:` below pins to a 40-character commit
#   SHA with a trailing `# v<x>.<y>` comment Dependabot can track.
#   The single exception is the SLSA generator reusable workflow,
#   which upstream documentation REQUIRES be referenced by tag —
#   the trusted-reusable-workflow signature is anchored to the tag,
#   not the underlying commit. `scripts/check-action-pins.sh`
#   allow-lists `slsa-framework/slsa-github-generator` for that
#   reason and enforces SHA pinning everywhere else.
{% raw %}
name: Release (SLSA L3)

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
{% endraw %}{% if cookiecutter.primary_language in ("python", "polyglot") %}{% raw %}

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install --upgrade pip build uv

      - name: Build wheel and sdist
        run: |
          python -m build --sdist --wheel --outdir dist/
{% endraw %}{% endif %}{% if cookiecutter.primary_language in ("typescript", "polyglot") %}{% raw %}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Build npm tarball
        run: |
          mkdir -p dist
          npm pack --pack-destination dist/
{% endraw %}{% endif %}{% raw %}

      - name: List build artifacts
        run: ls -la dist/

      - name: Hash artifacts
        id: hash
        working-directory: dist
        run: |
          # Produce a base64-encoded SHA-256 hashes file for
          # the SLSA generator to consume.
          hashes="$(sha256sum * | base64 -w0)"
          echo "hashes=${hashes}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-artifacts
          path: dist/
          retention-days: 7

  provenance:
    name: Generate SLSA L3 provenance
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    # SLSA reusable workflow — tag-pinned per generator policy.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true
{% endraw %}
