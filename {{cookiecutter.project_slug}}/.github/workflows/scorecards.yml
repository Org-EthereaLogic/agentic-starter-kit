# OSSF Scorecards — supply-chain security posture for {{ cookiecutter.project_name }}
#
# Runs the OpenSSF Scorecards analysis weekly and on every push to
# the default branch. Uploads the SARIF result to GitHub
# code-scanning so Scorecards findings appear inline with other
# security alerts.
#
# Action pinning policy (DIRECTIVES.md IMP-006):
#   Every `uses:` below is pinned to a 40-character commit SHA
#   with a trailing `# v<x>.<y>` comment Dependabot can track.
#   `scripts/check-action-pins.sh` enforces this mechanically.
{% raw %}
name: OSSF Scorecards

on:
  push:
    branches:
      - {% endraw %}{{ cookiecutter.default_branch_name }}{% raw %}
  schedule:
    - cron: "0 6 * * 1"  # Mondays at 06:00 UTC
  workflow_dispatch: {}

permissions: read-all

jobs:
  analysis:
    name: Scorecards analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Run Scorecards
        # ossf/scorecard-action does not publish a bare `@v2` tag — only
        # full semver tags. Pin to a published release so the workflow
        # resolves on the first push.
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF
          path: results.sarif
          retention-days: 7

      - name: Upload SARIF to code-scanning
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: results.sarif
{% endraw %}
